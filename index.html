<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 1: Menú de Meriendas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f0f4f8;
    }

    h1 {
      color: #333;
    }

    p {
      color: #555;
      margin-bottom: 10px;
    }

    /* Navegación */
    nav {
      margin-bottom: 20px;
    }

    nav a {
      display: inline-block;
      margin-right: 8px;         
      padding: 5px 12px;          
      border: 1px solid #999;     
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      background-color: white;
    }

    nav a:hover {
      background-color: #e0e0e0;
    }

    /* Sección de meriendas */
    .seccion {
      background-color: white;
      border: 1px solid #ccc;     
      border-radius: 6px;
      padding: 16px 20px;        
      margin-bottom: 20px;       
      max-width: 600px;          
    }

    .seccion h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #222;
    }

    /* Lista de meriendas */
    #lista-meriendas {
      padding-left: 20px;          
      margin: 10px 0;             
    }

    #lista-meriendas li {
      margin-bottom: 6px;          
    }

    /* Botón */
    #btn-contar {
      padding: 8px 16px;           
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    #btn-contar:hover {
      background-color: #357abd;
    }

    /* Texto resultado */
    #resultado-contador {
      margin-top: 10px;            
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Ejercicio 1: Menú de meriendas</h1>
  <p>Mostrar una lista desde un arreglo y, al hacer clic, indicar cuántos elementos tiene.</p>

  <!-- Navegación -->
  <nav>
    <a href="index.html">Inicio</a>
    <a href="destacados.html">Ejercicio 2</a>
    <a href="listado.html">Ejercicio 3</a>
  </nav>

  <!-- Lista de meriendas -->
  <div class="seccion">
    <h2>Meriendas disponibles</h2>
    <ul id="lista-meriendas">
      <!-- Se llena con JavaScript -->
    </ul>
  </div>

  <!-- Botón y contador -->
  <div class="seccion">
    <button id="btn-contar">Mostrar cantidad</button>
    <p id="resultado-contador">Cantidad: pendiente.</p>
  </div>

  <script>
    // Arreglo con las meriendas
    var meriendas = [
      "Yogur",
      "Fruta",
      "Tostadas",
      "Barrita de cereal",
      "Licuado",
      "Medialunas"
    ];

    // Mostrar la lista usando forEach
    var lista = document.getElementById("lista-meriendas");

    meriendas.forEach(function(merienda) {
      var item = document.createElement("li");
      item.textContent = merienda;
      lista.appendChild(item);
    });

    // Evento del botón: muestra la cantidad en el DOM
    var boton = document.getElementById("btn-contar");
    var resultado = document.getElementById("resultado-contador");

    boton.addEventListener("click", function() {
      resultado.textContent = "Cantidad: " + meriendas.length + " meriendas.";
    });
  </script>

</body>
</html>
