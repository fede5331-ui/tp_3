<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 1: Menú de Meriendas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f0f4f8;
    }

    .contenedor {
      background-color: #e8f0fb;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px 24px;
      max-width: 620px;
      margin-bottom: 20px;
    }

    .contenedor h1 {
      margin-top: 0;
      color: #333;
    }

    .contenedor p {
      color: #555;
      margin: 0;
    }

    nav {
      margin-top: 12px;
    }

    nav a {
      display: inline-block;
      margin-right: 8px;
      padding: 5px 12px;
      border: 1px solid #999;
      border-radius: 4px;
      text-decoration: none;
      color: #333;
      background-color: white;
    }

    nav a:hover {
      background-color: #e0e0e0;
    }

    .seccion {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 20px;
      max-width: 600px;
    }

    .seccion h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #222;
    }

    #lista-meriendas {
      padding-left: 20px;
      margin: 10px 0;
    }

    #lista-meriendas li {
      margin-bottom: 6px;
    }

    #btn-contar {
      padding: 8px 16px;
      background-color: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }

    #btn-contar:hover {
      background-color: #357abd;
    }

    #resultado-contador {
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <h1>Ejercicio 1: Menú de meriendas</h1>
    <p>Mostrar una lista desde un arreglo y, al hacer clic, indicar cuántos elementos tiene.</p>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="destacados.html">Ejercicio 2</a>
      <a href="listado.html">Ejercicio 3</a>
    </nav>
  </div>

  <div class="seccion">
    <h2>Meriendas disponibles</h2>
    <ul id="lista-meriendas"></ul>
  </div>

  <div class="seccion">
    <button id="btn-contar">Mostrar cantidad</button>
    <p id="resultado-contador">Cantidad: pendiente.</p>
  </div>

  <script>
    var meriendas = [
      "Yogur",
      "Fruta",
      "Tostadas",
      "Barrita de cereal",
      "Licuado",
      "Medialunas"
    ];

    var lista = document.getElementById("lista-meriendas");

    meriendas.forEach(function(merienda) {
      var item = document.createElement("li");
      item.textContent = merienda;
      lista.appendChild(item);
    });

    var boton = document.getElementById("btn-contar");
    var resultado = document.getElementById("resultado-contador");

    boton.addEventListener("click", function() {
      resultado.textContent = "Cantidad: " + meriendas.length + " meriendas.";
    });
  </script>

</body>
</html>
